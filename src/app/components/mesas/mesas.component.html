    <div class="logo-container">
        <img src="assets/IMG_5750.jpg" alt="Margarita Dominó" class="logo" />
    </div>

<div class="mesas-container">
  <h1 class="mesas-title">Mesas en juego</h1>

  <!-- ⏱ CRONÓMETRO GLOBAL -->
  <div class="cronometro-widget" *ngIf="cronometroConfig.habilitado">
      <div class="cronometro-display"
           [class.warning]="timerRemaining <= 300 && timerRemaining > 60"
           [class.danger]="timerRemaining <= 60 && !timerFinished"
           [class.finished]="timerFinished">
          <span class="timer-icon">⏱</span>
          <span class="timer-time">{{ formatTime(timerRemaining) }}</span>
          <span class="timer-label" *ngIf="timerFinished">¡Tiempo!</span>
      </div>

      <div class="cronometro-controls">
          <button class="ctrl-btn ctrl-start"
                  (click)="iniciarTimer()"
                  [disabled]="timerRunning || timerFinished">
              ▶ Iniciar
          </button>
          <button class="ctrl-btn ctrl-pause"
                  (click)="pausarTimer()"
                  [disabled]="!timerRunning">
              ⏸ Pausar
          </button>
          <button class="ctrl-btn ctrl-reset"
                  (click)="reiniciarTimer()">
              🔄 Reiniciar
          </button>
      </div>
  </div>

  <div class="mesas-list">
    <div class="mesa-card" *ngFor="let mesa of mesas">
      <h2>Mesa {{ mesa.id }}</h2>

      <p class="mesa-players">
        {{ mesa.jugadores.jugador1A }} — {{ mesa.jugadores.jugador2A }}
        &nbsp; | &nbsp;
        {{ mesa.jugadores.jugador1B }} — {{ mesa.jugadores.jugador2B }}
      </p>

      <p class="mesa-goal">
        Objetivo: {{ mesa.puntosParaGanar }} puntos
      </p>

      <button class="mesa-btn" (click)="irAMesa(mesa.id)">
        Abrir anotador
      </button>
    </div>
  </div>

  <button class="back-btn" (click)="volver()">Volver al inicio</button>
</div>
